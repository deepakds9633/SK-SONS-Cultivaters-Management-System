<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SK SONS Cultivators</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Apply saved theme immediately to avoid flash
        (function() {
            const t = localStorage.getItem('sk_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        /* Override auth check for login page */
        .login-theme-btn {
            display: flex; justify-content: center; margin-top: 14px;
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">🌾</div>
            <h1>SK SONS Cultivators</h1>
            <p>Agricultural Management System</p>
        </div>

        <div id="alert-box" style="display:none" class="alert"></div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required style="width: 100%; padding-right: 40px;">
                    <span id="togglePasswordBtn" style="position: absolute; right: 12px; cursor: pointer; color: var(--text-muted); user-select: none; display: flex; align-items: center; justify-content: center; transition: color 0.2s;" onclick="togglePasswordVisibility()" title="Show Password">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
                <span id="loginIcon">🔑</span>
                <span id="loginText">Sign In</span>
            </button>
        </form>

        <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:24px;">
            © 2026 SK SONS Cultivators · Admin Portal
        </p>
        <p style="text-align:center; margin-top:12px;">
            <a href="index.html" style="font-size:12px; color:var(--primary); text-decoration:none; font-weight:500;">← Back to Home</a>
        </p>
        <div class="login-theme-btn">
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleLoginTheme()">☀️ Light Mode</button>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    // Don't redirect if already on login page
    if (sessionStorage.getItem('sk_token')) {
        window.location.href = 'dashboard.html';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const alertBox = document.getElementById('alert-box');

        btn.disabled = true;
        document.getElementById('loginText').textContent = 'Signing in...';
        document.getElementById('loginIcon').textContent = '⏳';
        alertBox.style.display = 'none';

        try {
            const res = await fetch(`${API_HOST}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                sessionStorage.setItem('sk_token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                showAlert('error', '❌ ' + (data.message || 'Invalid credentials'));
            }
        } catch (err) {
            showAlert('error', '⚠️ Cannot connect to server. Make sure the backend is running on port 8080.');
        }

        btn.disabled = false;
        document.getElementById('loginText').textContent = 'Sign In';
        document.getElementById('loginIcon').textContent = '🔑';
    }

    function showAlert(type, message) {
        const box = document.getElementById('alert-box');
        box.className = `alert alert-${type}`;
        box.textContent = message;
        box.style.display = 'flex';
    }

    function toggleLoginTheme() {
        const current = localStorage.getItem('sk_theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sk_theme', next);
        document.getElementById('themeToggleBtn').innerHTML =
            next === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
    }

    const eyeOpenSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const eyeOffSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    function togglePasswordVisibility() {
        const pwdInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePasswordBtn');
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            toggleBtn.innerHTML = eyeOffSVG;
            toggleBtn.style.color = 'var(--primary)';
            toggleBtn.title = 'Hide Password';
        } else {
            pwdInput.type = 'password';
            toggleBtn.innerHTML = eyeOpenSVG;
            toggleBtn.style.color = 'var(--text-muted)';
            toggleBtn.title = 'Show Password';
        }
    }

    // Set correct button label on load
    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('sk_theme') || 'dark';
        const btn = document.getElementById('themeToggleBtn');
        if (btn) btn.innerHTML = saved === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
    });
</script>
</body>
</html>
