<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SK SONS Cultivators</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Apply saved theme immediately to avoid flash
        (function() {
            const t = localStorage.getItem('sk_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        /* Override auth check for login page */
        .login-theme-btn {
            display: flex; justify-content: center; margin-top: 14px;
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">🌾</div>
            <h1>SK SONS Cultivators</h1>
            <p>Agricultural Management System</p>
        </div>

        <div id="alert-box" style="display:none" class="alert"></div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
                <span id="loginIcon">🔑</span>
                <span id="loginText">Sign In</span>
            </button>
        </form>

        <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:24px;">
            © 2026 SK SONS Cultivators · Admin Portal
        </p>
        <p style="text-align:center; margin-top:12px;">
            <a href="index.html" style="font-size:12px; color:var(--primary); text-decoration:none; font-weight:500;">← Back to Home</a>
        </p>
        <div class="login-theme-btn">
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleLoginTheme()">☀️ Light Mode</button>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    // Don't redirect if already on login page
    if (sessionStorage.getItem('sk_token')) {
        window.location.href = 'dashboard.html';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const alertBox = document.getElementById('alert-box');

        btn.disabled = true;
        document.getElementById('loginText').textContent = 'Signing in...';
        document.getElementById('loginIcon').textContent = '⏳';
        alertBox.style.display = 'none';

        try {
            const res = await fetch(`${API_HOST}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                sessionStorage.setItem('sk_token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                showAlert('error', '❌ ' + (data.message || 'Invalid credentials'));
            }
        } catch (err) {
            showAlert('error', '⚠️ Cannot connect to server. Make sure the backend is running on port 8080.');
        }

        btn.disabled = false;
        document.getElementById('loginText').textContent = 'Sign In';
        document.getElementById('loginIcon').textContent = '🔑';
    }

    function showAlert(type, message) {
        const box = document.getElementById('alert-box');
        box.className = `alert alert-${type}`;
        box.textContent = message;
        box.style.display = 'flex';
    }

    function toggleLoginTheme() {
        const current = localStorage.getItem('sk_theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sk_theme', next);
        document.getElementById('themeToggleBtn').innerHTML =
            next === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
    }

    // Set correct button label on load
    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('sk_theme') || 'dark';
        const btn = document.getElementById('themeToggleBtn');
        if (btn) btn.innerHTML = saved === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
    });
</script>
</body>
</html>
